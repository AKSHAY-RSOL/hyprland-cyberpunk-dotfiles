######################################################################################
# CYBERPUNK HYPRLAND CONFIG - GENERATED FOR AKSHAY
# Setup: Dell Latitude 5420 | Intel Xe | 11th Gen
######################################################################################

# --- MONITORS ---
# Explicitly handle the laptop screen to avoid black screen issues on some drivers
monitor=eDP-1,preferred,auto,1
monitor=,preferred,auto,auto

# --- AUTOSTART ---
exec-once = waybar &                     # Status bar
# exec-once = swww init &                  # Wallpaper daemon (Static)
exec-once = mpvpaper -o "loop" eDP-1 $HOME/.config/hypr/wallpapers/6.mp4 & # Video Wallpaper
exec-once = hypridle &
exec-once = nm-applet --indicator &      # Network
exec-once = dunst &                      # Notifications (or mako)
exec-once = blueman-applet &             # Bluetooth Tray Icon
exec-once = /usr/lib/polkit-kde-authentication-agent-1 & # Polkit
# Fix for cursor not showing up sometimes
exec-once = hyprctl setcursor Bibata-Modern-Ice 24

# --- ENVIRONMENT VARIABLES ---
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = LIBVA_DRIVER_NAME,iHD # Hardware accel for Intel 11th gen
env = XDG_SESSION_TYPE,wayland

# --- INPUT ---
input {
    kb_layout = us
    repeat_rate = 10
    repeat_delay = 600
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

# --- CURSOR ---
cursor {
    no_warps = false
}

# --- GENERAL ---
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 3
    
    # CYBERPUNK NEON AESTHETIC
    # Active: Cyan to Magenta Gradient @ 45deg
    col.active_border = rgb(00f3ff) rgb(ff00ff) 45deg
    # Inactive: Dark Grey/Slate
    col.inactive_border = rgb(595959)

    layout = dwindle
}

# --- DECORATION ---
decoration {
    rounding = 12
    
    blur {
        enabled = true
        size = 8
        passes = 4
        new_optimizations = true
        ignore_opacity = true
        xray = false
        noise = 0.02
        contrast = 1.0 # High contrast for neon
        brightness = 1.0
    }

    # Shadow (Glow effect)
    shadow {
        enabled = true
        range = 25
        render_power = 4
        color = rgba(00f3ff55) # Stronger Cyan glow
        color_inactive = rgba(00000088)
    }
    
    active_opacity = 0.85
    inactive_opacity = 0.75
    fullscreen_opacity = 0.95
}

# --- ANIMATIONS ---
animations {
    enabled = true

    # "Tech" feel: Snappy but smooth
    bezier = cyberpunk, 0.05, 0.9, 0.1, 1.05
    
    animation = windows, 1, 5, cyberpunk
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, cyberpunk
}

# --- LAYOUTS ---
dwindle {
    pseudotile = true
    preserve_split = true
}

# gestures {
#     workspace_swipe = true
# }

# WINDOW RULES
windowrulev2 = tile, class:^(Spotify)$
windowrulev2 = workspace 9 silent, class:^(Spotify)$
windowrulev2 = opacity 0.0 override 0.0 override, class:^(xwaylandvideobridge)$
windowrulev2 = noanim, class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus, class:^(xwaylandvideobridge)$
windowrulev2 = maxsize 1 1, class:^(xwaylandvideobridge)$
windowrulev2 = noblur, class:^(xwaylandvideobridge)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$

# --- KEYBINDINGS ---
$mainMod = SUPER

bind = $mainMod, Q, exec, kitty
bind = $mainMod, C, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, E, exec, dolphin # or thunar/nautilus
bind = $mainMod, V, togglefloating, 
bind = $mainMod, D, exec, rofi -show drun -theme ~/.config/rofi/launcher.rasi
bind = $mainMod, L, exec, ~/.config/hypr/scripts/lock_with_video.sh # Lock with video transition

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move/Swap windows with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Master/Slave controls
bind = $mainMod, Return, layoutmsg, swapwithmaster

# Special Workspace (Hidden Drawer)
bind = $mainMod, H, togglespecialworkspace, magic
bind = $mainMod SHIFT, H, movetoworkspace, special:magic

# Tablet Mode (Extended Display via USB)
bind = $mainMod, T, exec, ~/.config/hypr/scripts/tablet_mode.sh

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Functional Keys (Volume, Brightness)
binde=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=, XF86MonBrightnessUp, exec, brightnessctl s +5%
bind=, XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Media Player Controls
bindl=, XF86AudioPlay, exec, playerctl play-pause
bindl=, XF86AudioNext, exec, playerctl next
bindl=, XF86AudioPrev, exec, playerctl previous

# Screenshot (grim + slurp)
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
