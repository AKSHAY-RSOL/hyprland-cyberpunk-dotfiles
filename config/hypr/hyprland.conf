################################################################################
#                     CYBERPUNK HYPRLAND CONFIG                                 
#                     Neon Dreams • Glass Aesthetics                            
################################################################################

# --- MONITORS ---
# Default: Use preferred resolution, auto position
# For laptops, eDP-1 is typically the built-in display
monitor = eDP-1, preferred, auto, 1
monitor = , preferred, auto, auto

# --- AUTOSTART ---
exec-once = waybar
exec-once = hypridle
exec-once = dunst
exec-once = nm-applet --indicator
exec-once = blueman-applet

# Wallpaper - Choose ONE option:
# Option 1: Video wallpaper (requires mpvpaper from AUR)
exec-once = mpvpaper -o "loop" eDP-1 ~/.config/hypr/wallpapers/video.mp4

# Option 2: Static wallpaper (uncomment and comment above)
# exec-once = swww init
# exec-once = sleep 1 && swww img ~/.config/hypr/wallpapers/wallpaper.png

# Polkit agent (for authentication dialogs)
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Cursor fix
exec-once = hyprctl setcursor Bibata-Modern-Ice 24

# --- ENVIRONMENT VARIABLES ---
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = QT_QPA_PLATFORMTHEME,qt5ct
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# --- INPUT ---
input {
    kb_layout = us
    repeat_rate = 25
    repeat_delay = 600
    follow_mouse = 1

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        scroll_factor = 0.5
    }

    sensitivity = 0
}

# --- CURSOR ---
cursor {
    no_warps = false
}

# --- GENERAL ---
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 3

    # Cyberpunk Neon: Cyan to Magenta gradient
    col.active_border = rgb(00f3ff) rgb(ff00ff) 45deg
    col.inactive_border = rgb(595959)

    layout = dwindle
    resize_on_border = true
}

# --- DECORATION ---
decoration {
    rounding = 12

    blur {
        enabled = true
        size = 8
        passes = 4
        new_optimizations = true
        ignore_opacity = true
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
    }

    shadow {
        enabled = true
        range = 25
        render_power = 4
        color = rgba(00f3ff55)
        color_inactive = rgba(00000088)
    }

    active_opacity = 0.85
    inactive_opacity = 0.75
    fullscreen_opacity = 1.0
}

# --- ANIMATIONS ---
animations {
    enabled = true

    bezier = cyberpunk, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1

    animation = windows, 1, 5, cyberpunk
    animation = windowsOut, 1, 4, smoothOut, popin 80%
    animation = windowsIn, 1, 4, smoothIn, slide
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, cyberpunk
}

# --- LAYOUTS ---
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

# --- GESTURES ---
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
}

# --- MISC ---
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# --- WINDOW RULES ---
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = float, title:^(Volume Control)$

# Spotify rules
windowrulev2 = tile, class:^(Spotify)$
windowrulev2 = workspace 9 silent, class:^(Spotify)$

# XWayland video bridge (for screen sharing)
windowrulev2 = opacity 0.0 override 0.0 override, class:^(xwaylandvideobridge)$
windowrulev2 = noanim, class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus, class:^(xwaylandvideobridge)$
windowrulev2 = maxsize 1 1, class:^(xwaylandvideobridge)$
windowrulev2 = noblur, class:^(xwaylandvideobridge)$

# --- KEYBINDINGS ---
$mainMod = SUPER

# Applications
bind = $mainMod, Q, exec, kitty
bind = $mainMod, E, exec, dolphin
bind = $mainMod, D, exec, rofi -show drun -theme ~/.config/rofi/launcher.rasi
bind = $mainMod, L, exec, ~/.config/hypr/scripts/lock.sh

# Window management
bind = $mainMod, C, killactive
bind = $mainMod, M, exit
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit

# Focus movement
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Window movement
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize windows
binde = $mainMod CTRL, left, resizeactive, -20 0
binde = $mainMod CTRL, right, resizeactive, 20 0
binde = $mainMod CTRL, up, resizeactive, 0 -20
binde = $mainMod CTRL, down, resizeactive, 0 20

# Special workspace
bind = $mainMod, H, togglespecialworkspace, magic
bind = $mainMod SHIFT, H, movetoworkspace, special:magic

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume control
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness control
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Media controls
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioStop, exec, playerctl stop

# Screenshots
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh region
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = $mainMod, Print, exec, ~/.config/hypr/scripts/screenshot.sh window
