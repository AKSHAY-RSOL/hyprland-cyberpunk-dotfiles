# Cyberpunk Hyprlock Config
# Neon lock screen with glassmorphism

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

background {
    monitor =
    path = ~/.config/hypr/wallpapers/lock_wallpaper.png
    color = rgba(5, 10, 14, 1.0)
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(0, 243, 255, 1.0)
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -300
    halign = center
    valign = top
    shadow_passes = 5
    shadow_size = 10
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(255, 255, 255, 0.8)
    font_size = 25
    font_family = JetBrainsMono Nerd Font
    position = 0, -180
    halign = center
    valign = top
}

# USER GREETING
label {
    monitor =
    text = Welcome, $USER
    color = rgba(255, 0, 255, 0.9)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, -50
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 280, 60
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(0, 243, 255, 1.0)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    rounding = 12
    check_color = rgb(0, 243, 255)
    fail_color = rgb(255, 0, 85)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    position = 0, -120
    halign = center
    valign = center
}
