# NERD FONT
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# WINDOW
background_opacity 0.85
window_padding_width 10

# CYBERPUNK NEON THEME

# The basic colors
foreground              #00f3ff
background              #050a0e
selection_foreground    #000000
selection_background    #ff00ff

# Cursor
cursor                  #ff00ff
cursor_text_color       #000000

# URL underline color when hovering with mouse
url_color               #00f3ff

# Kitty window border colors
active_border_color     #00f3ff
inactive_border_color   #595959
bell_border_color       #ff5555

# Tab bar colors
active_tab_foreground   #000000
active_tab_background   #00f3ff
inactive_tab_foreground #44475a
inactive_tab_background #282a36
tab_bar_background      #282a36

# Colors for marks (marked text in the terminal)
mark1_foreground #282a36
mark1_background #ff5555

# The 16 terminal colors

# black
color0  #21222c
color8  #6272a4

# red
color1  #ff5555
color9  #ff6e6e

# green
color2  #50fa7b
color10 #69ff94

# yellow
color3  #f1fa8c
color11 #ffffa5

# blue
color4  #bd93f9
color12 #d6acff

# magenta
color5  #ff79c6
color13 #ff92df

# cyan
color6  #8be9fd
